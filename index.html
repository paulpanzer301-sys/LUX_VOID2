<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LUX_VOID_6_66</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:'Space Grotesk',system-ui,sans-serif;color:#fff}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
canvas{display:block;position:absolute;inset:0}

/* ── LANDING ── */
#landing{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;background:#000;
  transition:opacity .9s ease;
}
#landing.out{opacity:0;pointer-events:none}
.scan-line{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.013) 3px,rgba(255,255,255,.013) 4px)}
.lux-title{
  font-size:clamp(2.2rem,6vw,5rem);font-weight:300;
  letter-spacing:.45em;color:#fff;text-align:center;line-height:1.1;
}
.lux-sub{
  font-size:clamp(.65rem,1.4vw,.82rem);letter-spacing:.38em;
  color:rgba(255,255,255,.35);margin:.9rem 0 3.2rem;text-align:center;
  text-transform:uppercase;
}
.enter-btn{
  border:1px solid rgba(255,255,255,.22);background:transparent;color:#fff;
  padding:.8rem 2.8rem;letter-spacing:.28em;font-size:.72rem;
  font-family:inherit;cursor:pointer;transition:all .35s;text-transform:uppercase;
}
.enter-btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.5);letter-spacing:.32em}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;padding:1.2rem 1.8rem;
  display:flex;align-items:center;justify-content:space-between;
  z-index:200;pointer-events:none;
}
#hud.active{pointer-events:all}
.hud-logo{font-size:.65rem;letter-spacing:.3em;opacity:.38;color:#fff;font-weight:300}
.hud-right{display:flex;gap:.8rem;align-items:center}
.hud-btn{
  border:1px solid rgba(255,255,255,.16);background:transparent;color:#fff;
  padding:.32rem .9rem;font-size:.6rem;letter-spacing:.18em;
  font-family:inherit;cursor:pointer;transition:all .3s;text-transform:uppercase;
  display:none;
}
.hud-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.4)}
.hud-btn.vis{display:block}

/* ── TOOLTIP ── */
#tooltip{
  position:fixed;pointer-events:none;
  background:rgba(5,5,5,.9);border:1px solid rgba(255,255,255,.15);
  padding:.38rem 1rem;font-size:.62rem;letter-spacing:.18em;
  color:#fff;display:none;z-index:300;text-transform:uppercase;
  backdrop-filter:blur(4px);
}

/* ── GALLERY OVERLAY ── */
#gallery{position:fixed;inset:0;z-index:150;display:none}
#gallery.vis{display:block}
#gallery canvas{position:absolute;inset:0;width:100%!important;height:100%!important}
#gallery-hud{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.2rem 1.8rem;display:flex;align-items:center;gap:1rem;
  background:linear-gradient(transparent,rgba(0,0,0,.7));
  pointer-events:none;z-index:10;
}
.gallery-label{font-size:.62rem;letter-spacing:.25em;opacity:.45;text-transform:uppercase}
.gallery-hint{font-size:.55rem;letter-spacing:.15em;opacity:.25;margin-left:auto}

/* ── DETAIL VIEW ── */
#detail{
  position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.97);
  display:none;overflow-y:auto;
}
#detail.vis{display:block}
.detail-inner{max-width:860px;margin:0 auto;padding:5.5rem 2rem 4rem;width:100%}
.detail-img-wrap{
  width:100%;aspect-ratio:16/9;background:#0d0d0d;
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:2.5rem;overflow:hidden;position:relative;
}
.detail-img-wrap img{width:100%;height:100%;object-fit:cover;display:none}
.detail-img-wrap .img-ph{
  font-size:.65rem;letter-spacing:.22em;opacity:.2;text-align:center;line-height:2;
}
.detail-color-bar{position:absolute;top:0;left:0;width:3px;height:100%}
.detail-title{
  font-size:clamp(1.8rem,4vw,3rem);font-weight:300;
  letter-spacing:.12em;margin-bottom:1.8rem;opacity:.95;
}
.detail-meta{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:.6rem 2.5rem;margin-bottom:2.2rem;
  border-top:1px solid rgba(255,255,255,.08);padding-top:1.5rem;
}
.meta-row{display:flex;flex-direction:column;gap:.25rem}
.meta-label{font-size:.55rem;letter-spacing:.28em;opacity:.28;text-transform:uppercase}
.meta-val{font-size:.82rem;opacity:.78;letter-spacing:.04em}
.detail-desc{
  font-size:.88rem;line-height:1.78;opacity:.5;max-width:62ch;
  margin-bottom:2.5rem;border-left:1px solid rgba(255,255,255,.1);
  padding-left:1.2rem;
}
.detail-btns{display:flex;gap:.8rem;flex-wrap:wrap}
.d-btn{
  border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;
  padding:.5rem 1.4rem;font-size:.62rem;letter-spacing:.2em;
  font-family:inherit;cursor:pointer;text-transform:uppercase;transition:all .3s;
}
.d-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.4)}

/* ── LIGHT MODE ── */
body.light{background:#edeae4;color:#111}
body.light #landing{background:#edeae4}
body.light .lux-title{color:#111}
body.light .lux-sub{color:rgba(0,0,0,.35)}
body.light .enter-btn{color:#111;border-color:rgba(0,0,0,.18)}
body.light .enter-btn:hover{background:rgba(0,0,0,.05)}
body.light .hud-logo{color:#111}
body.light .hud-btn{color:#111;border-color:rgba(0,0,0,.18)}
body.light #tooltip{background:rgba(255,255,255,.95);color:#111;border-color:rgba(0,0,0,.12)}
body.light #detail{background:rgba(237,234,228,.98);color:#111}
body.light .detail-img-wrap{background:#ddd8d0;border-color:rgba(0,0,0,.08)}
body.light .detail-meta{border-color:rgba(0,0,0,.08)}
body.light .detail-desc{opacity:.55;border-color:rgba(0,0,0,.1)}
body.light .d-btn{color:#111;border-color:rgba(0,0,0,.15)}
body.light .d-btn:hover{background:rgba(0,0,0,.05)}
body.light .gallery-label,.gallery-hint{color:#111}

/* ── MOBILE NAV ── */
#mobile-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:220;
  background:rgba(0,0,0,.9);border-top:1px solid rgba(255,255,255,.08);
  padding:.6rem 1rem;gap:.6rem;backdrop-filter:blur(8px);
}
.mn-btn{
  background:transparent;border:1px solid rgba(255,255,255,.14);color:#fff;
  flex:1;padding:.55rem .4rem;font-size:.58rem;letter-spacing:.14em;
  font-family:inherit;cursor:pointer;text-transform:uppercase;transition:all .3s;
}
.mn-btn:hover{background:rgba(255,255,255,.08)}
@media(max-width:640px){
  #mobile-nav{display:flex}
  #hud{display:none}
  .detail-inner{padding:4.5rem 1.2rem 6rem}
  .detail-title{font-size:1.6rem}
}
</style>
</head>
<body>
<div id="app">

<!-- LANDING -->
<div id="landing">
  <div class="scan-line"></div>
  <div class="lux-title">LUX_VOID_6_66</div>
  <div class="lux-sub">A Spatial Archive of Light</div>
  <button class="enter-btn" onclick="enterVoid()">ENTER VOID</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-logo">LUX_VOID_6_66 · VIENNA</div>
  <div class="hud-right">
    <button class="hud-btn" id="back-btn" onclick="goBack()">← BACK</button>
    <button class="hud-btn vis" id="mode-btn" onclick="toggleMode()">LIGHT MODE</button>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip" id="tip"></div>

<!-- MAIN CANVAS -->
<canvas id="main-canvas"></canvas>

<!-- GALLERY -->
<div id="gallery">
  <canvas id="gal-canvas"></canvas>
  <div id="gallery-hud">
    <span class="gallery-label" id="gal-label">PROJECT GALLERY</span>
    <span class="gallery-hint">DRAG TO LOOK · CLICK TO OPEN</span>
  </div>
</div>

<!-- DETAIL -->
<div id="detail">
  <div class="detail-inner">
    <div class="detail-img-wrap" id="d-img-wrap">
      <div class="detail-color-bar" id="d-color-bar"></div>
      <div class="img-ph" id="d-img-ph">IMAGE PLACEHOLDER<br><span style="opacity:.4;font-size:.55rem">REPLACE WITH REAL IMAGE PATH</span></div>
    </div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-meta" id="d-meta"></div>
    <div class="detail-desc" id="d-desc"></div>
    <div class="detail-btns">
      <button class="d-btn" onclick="closeDetail()">← GALLERY ROOM</button>
      <button class="d-btn" onclick="backToMain()">↩ MAIN SPACE</button>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div id="mobile-nav">
  <button class="mn-btn" onclick="goBack()">← BACK</button>
  <button class="mn-btn" onclick="backToMain()">MAIN SPACE</button>
  <button class="mn-btn" onclick="toggleMode()">MODE</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════
// DATA — edit here to add/modify projects
// ═══════════════════════════════════════════════════
const PROJECTS = [
  {
    id:"NODE_001", title:"INNIG", color:"#00E5FF",
    position:[0,1.2,-7],
    year:"2023", location:"Wien, AT", role:"Light Design",
    material:"LED, Fog Machine, Mirror Film",
    desc:"A meditative exploration of inner light and spatial resonance. Soft cyan layers dissolve the boundary between architecture and atmosphere, creating a contemplative void that responds to the visitor's presence.",
    images:[] // add image paths here: ["/img/innig_1.jpg","..."]
  },
  {
    id:"NODE_002", title:"UNSAFE", color:"#FF2D55",
    position:[-7,0,2],
    year:"2022", location:"Berlin, DE", role:"Site-Specific Installation",
    material:"UV Neon Tube, Industrial Haze, Steel",
    desc:"A site-specific neon intervention inside an abandoned Neukölln factory. Red UV frequencies pulse through corroded steel structures, challenging conventions of safety and transgression through light.",
    images:[]
  },
  {
    id:"NODE_003", title:"STRUMA", color:"#BF5FFF",
    position:[7,-1,2],
    year:"2024", location:"Graz, AT", role:"Light Sculpture",
    material:"Dichroic Glass, Aluminum, Custom LED Driver",
    desc:"Light stratified through stacked dichroic glass panels creates geological luminous strata. Each layer reveals a different spectral identity — the work reimagines geological time as a visible light archive.",
    images:[]
  },
  {
    id:"NODE_004", title:"LIGHT DESIGN", color:"#00FF85",
    position:[3.5,4.5,-3],
    year:"2021", location:"Wien, AT", role:"Architectural Lighting",
    material:"RGBW LED, DMX512, Architectural Fixtures",
    desc:"Comprehensive architectural lighting concept for a Viennese cultural institution. Functional and poetic integration — daytime clarity transitions seamlessly into nocturnal atmosphere through programmed scenes.",
    images:[]
  },
  {
    id:"NODE_005", title:"WELTRAUM BAR", color:"#FF8C00",
    position:[-4.5,3,4.5],
    year:"2023", location:"Wien, AT", role:"Ambient Lighting Design",
    material:"Custom Neon, Edison Sources, Programmable LEDs",
    desc:"Cosmic atmosphere for a Viennese bar. Warm deep-space amber meets clinical fluorescence in deliberate tension — a lighting design that makes time feel suspended between planets.",
    images:[]
  },
  {
    id:"NODE_006", title:"MUSIC PAVILION", color:"#00BFFF",
    position:[2,-4.5,-2],
    year:"2024", location:"Linz, AT", role:"Stage & Spatial Light",
    material:"Moving Heads, GOBO, Haze, Laser Line",
    desc:"Ephemeral light architecture for an outdoor music pavilion. Dynamic systems synchronize with acoustic frequencies — light becomes a visible instrument, the room a shared score.",
    images:[]
  },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let view = 'landing';
let dark = true;
let currentProject = null;

let mScene, mCam, mRenderer, mClock;
let sphereMeshes = [];
let mPhi = Math.PI/2, mTheta = 0;

let gScene, gCam, gRenderer, gClock;
let gFrames = [];
let gPhi = Math.PI/2, gTheta = 0;

let dragging = false, prevXY = {x:0,y:0};
let gDragging = false, gPrevXY = {x:0,y:0};

// ═══════════════════════════════════════════════════
// LANDING → VOID
// ═══════════════════════════════════════════════════
function enterVoid() {
  const L = document.getElementById('landing');
  L.classList.add('out');
  setTimeout(() => {
    L.style.display = 'none';
    document.getElementById('hud').classList.add('active');
    initMain();
    view = 'main';
  }, 900);
}

// ═══════════════════════════════════════════════════
// MAIN 3D SPACE
// ═══════════════════════════════════════════════════
function initMain() {
  const canvas = document.getElementById('main-canvas');
  mScene = new THREE.Scene();
  mScene.background = new THREE.Color(dark ? 0x000000 : 0xedeae4);
  mScene.fog = new THREE.FogExp2(dark ? 0x000000 : 0xedeae4, 0.022);

  mCam = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 200);
  mCam.position.set(0,0,0);

  mRenderer = new THREE.WebGLRenderer({canvas, antialias:true});
  mRenderer.setSize(innerWidth, innerHeight);
  mRenderer.setPixelRatio(Math.min(devicePixelRatio, 2));

  // Lights
  mScene.add(new THREE.AmbientLight(0xffffff, dark ? 0.08 : 0.6));
  const hemi = new THREE.HemisphereLight(0x111133, 0x000000, dark ? 0.3 : 0.5);
  mScene.add(hemi);

  // Grid floor
  const grid = new THREE.GridHelper(80, 50, 0x0d0d0d, 0x060606);
  grid.position.y = -4;
  mScene.add(grid);

  // Stars
  const sg = new THREE.BufferGeometry();
  const sv = [];
  for(let i=0;i<800;i++) sv.push((Math.random()-.5)*80,(Math.random()-.5)*80,(Math.random()-.5)*80);
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
  mScene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:0.045,transparent:true,opacity:0.35})));

  // Spheres
  PROJECTS.forEach((p, i) => {
    const geo = new THREE.SphereGeometry(0.38, 32, 32);
    const mat = new THREE.MeshPhongMaterial({
      color: p.color, emissive: p.color,
      emissiveIntensity: dark ? 0.7 : 0.3,
      transparent: true, opacity: 0.92,
      shininess: 120,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...p.position);
    mesh.userData = { project: p };
    mScene.add(mesh);

    // Glow halo
    const hGeo = new THREE.SphereGeometry(0.55, 16, 16);
    const hMat = new THREE.MeshBasicMaterial({
      color: p.color, transparent: true,
      opacity: 0.06, side: THREE.BackSide
    });
    const halo = new THREE.Mesh(hGeo, hMat);
    mesh.add(halo);
    mesh.userData.haloMat = hMat;
    mesh.userData.mat = mat;

    // Point light
    const pl = new THREE.PointLight(p.color, dark ? 1.2 : 0.4, 6);
    pl.position.set(...p.position);
    mScene.add(pl);
    mesh.userData.light = pl;

    sphereMeshes.push(mesh);
  });

  bindMainEvents();
  mClock = new THREE.Clock();
  animMain();
}

function animMain() {
  requestAnimationFrame(animMain);
  const t = mClock.getElapsedTime();
  sphereMeshes.forEach((mesh, i) => {
    const { mat, haloMat } = mesh.userData;
    const pulse = 0.5 + Math.sin(t * 1.1 + i * 1.2) * 0.3;
    mat.emissiveIntensity = dark ? pulse : pulse * 0.4;
    haloMat.opacity = 0.04 + Math.sin(t * 0.9 + i) * 0.03;
    mesh.scale.setScalar(1 + Math.sin(t * 1.4 + i * 0.7) * 0.04);
    mesh.rotation.y = t * 0.2 + i * 0.6;
  });
  // Update cam look
  const x = Math.sin(mPhi)*Math.sin(mTheta);
  const y = Math.cos(mPhi);
  const z = Math.sin(mPhi)*Math.cos(mTheta);
  mCam.lookAt(x, y, z);
  mRenderer.render(mScene, mCam);
}

// ═══════════════════════════════════════════════════
// MAIN EVENTS
// ═══════════════════════════════════════════════════
function bindMainEvents() {
  const c = document.getElementById('main-canvas');
  const tip = document.getElementById('tooltip');
  const rc = new THREE.Raycaster();
  const m2 = new THREE.Vector2();

  c.addEventListener('mousedown', e => { dragging=true; prevXY={x:e.clientX,y:e.clientY}; });
  window.addEventListener('mouseup', () => dragging=false);
  window.addEventListener('mousemove', e => {
    if(dragging && view==='main') {
      mTheta -= (e.clientX - prevXY.x) * 0.003;
      mPhi = Math.max(0.1, Math.min(Math.PI-0.1, mPhi + (e.clientY-prevXY.y)*0.003));
      prevXY = {x:e.clientX,y:e.clientY};
      tip.style.display='none';
      return;
    }
    if(view!=='main') return;
    m2.x=(e.clientX/innerWidth)*2-1; m2.y=-(e.clientY/innerHeight)*2+1;
    rc.setFromCamera(m2, mCam);
    const hits = rc.intersectObjects(sphereMeshes);
    if(hits.length) {
      const p = hits[0].object.userData.project;
      tip.style.display='block';
      tip.style.left=e.clientX+14+'px';
      tip.style.top=e.clientY-8+'px';
      tip.textContent = p.id+' — '+p.title;
      document.body.style.cursor='pointer';
    } else {
      tip.style.display='none';
      document.body.style.cursor='default';
    }
  });

  c.addEventListener('touchstart', e => {dragging=true; prevXY={x:e.touches[0].clientX,y:e.touches[0].clientY};}, {passive:true});
  window.addEventListener('touchend', e => {
    if(view==='main' && Math.abs(e.changedTouches[0].clientX-prevXY.x)<10 && Math.abs(e.changedTouches[0].clientY-prevXY.y)<10) {
      m2.x=(e.changedTouches[0].clientX/innerWidth)*2-1;
      m2.y=-(e.changedTouches[0].clientY/innerHeight)*2+1;
      rc.setFromCamera(m2, mCam);
      const hits=rc.intersectObjects(sphereMeshes);
      if(hits.length) flyTo(hits[0].object.userData.project);
    }
    dragging=false;
  });
  window.addEventListener('touchmove', e => {
    if(!dragging||view!=='main') return;
    mTheta -= (e.touches[0].clientX-prevXY.x)*0.004;
    mPhi=Math.max(0.1,Math.min(Math.PI-0.1,mPhi+(e.touches[0].clientY-prevXY.y)*0.004));
    prevXY={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }, {passive:true});

  c.addEventListener('click', e => {
    m2.x=(e.clientX/innerWidth)*2-1; m2.y=-(e.clientY/innerHeight)*2+1;
    rc.setFromCamera(m2,mCam);
    const hits=rc.intersectObjects(sphereMeshes);
    if(hits.length) { tip.style.display='none'; flyTo(hits[0].object.userData.project); }
  });
}

// ═══════════════════════════════════════════════════
// FLY ANIMATION
// ═══════════════════════════════════════════════════
function flyTo(proj) {
  if(view!=='main') return;
  currentProject = proj;
  const [tx,ty,tz] = proj.position;
  const tTheta = Math.atan2(tx, tz);
  const dist = Math.sqrt(tx*tx+tz*tz);
  const tPhi = Math.PI/2 - Math.atan2(ty, dist);
  const sT=mTheta, sP=mPhi, dur=900, s=performance.now();
  function step(now) {
    const pct = Math.min((now-s)/dur,1);
    const ease = pct<.5 ? 2*pct*pct : 1-Math.pow(-2*pct+2,2)/2;
    mTheta = sT + (tTheta-sT)*ease;
    mPhi = sP + (tPhi-sP)*ease;
    if(pct<1) requestAnimationFrame(step);
    else setTimeout(() => openGallery(), 200);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════
// GALLERY ROOM
// ═══════════════════════════════════════════════════
function openGallery() {
  view = 'gallery';
  document.getElementById('gallery').classList.add('vis');
  document.getElementById('back-btn').classList.add('vis');
  document.getElementById('gal-label').textContent = currentProject.id+' — '+currentProject.title.toUpperCase();
  gPhi = Math.PI/2; gTheta = 0;
  if(!gRenderer) { initGallery(); }
  else { rebuildGallery(); }
}

function initGallery() {
  const c = document.getElementById('gal-canvas');
  gScene = new THREE.Scene();
  gScene.background = new THREE.Color(dark ? 0x050505 : 0xf5f1eb);
  gScene.fog = new THREE.Fog(dark ? 0x050505 : 0xf5f1eb, 6, 18);

  gCam = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 50);
  gCam.position.set(0,0,0);

  gRenderer = new THREE.WebGLRenderer({canvas:c, antialias:true});
  gRenderer.setSize(innerWidth, innerHeight);
  gRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  gRenderer.shadowMap.enabled = true;

  buildGalleryScene();
  bindGalleryEvents();
  gClock = new THREE.Clock();
  animGallery();
}

function buildGalleryScene() {
  // Clear old meshes
  const toRemove = gScene.children.filter(c => c.isMesh || c.isLight || c.isGroup);
  toRemove.forEach(o => gScene.remove(o));
  gFrames = [];

  const wC = dark ? 0x0d0d0d : 0xf0ebe3;
  const fC = dark ? 0x080808 : 0xe5e0d8;
  const wallMat = new THREE.MeshLambertMaterial({color:wC});
  const floorMat= new THREE.MeshLambertMaterial({color:fC});

  // Room surfaces
  [
    {w:14,h:9,  x:0,  y:.5, z:-6.5, ry:0},
    {w:14,h:9,  x:0,  y:.5, z:6.5,  ry:Math.PI},
    {w:14,h:9,  x:-6.5,y:.5,z:0,   ry:Math.PI/2},
    {w:14,h:9,  x:6.5, y:.5,z:0,   ry:-Math.PI/2},
  ].forEach(({w,h,x,y,z,ry}) => {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w,h), wallMat);
    mesh.position.set(x,y,z); mesh.rotation.y=ry;
    gScene.add(mesh);
  });
  // Floor
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(14,14),floorMat);
  fl.rotation.x=-Math.PI/2; fl.position.y=-4; gScene.add(fl);
  // Ceiling
  const ce=new THREE.Mesh(new THREE.PlaneGeometry(14,14),wallMat);
  ce.rotation.x=Math.PI/2; ce.position.y=5; gScene.add(ce);

  // Ambient
  gScene.add(new THREE.AmbientLight(0xffffff, dark ? 0.12 : 0.7));

  const col = new THREE.Color(currentProject.color);

  // Frame positions on walls
  const frameConfigs = [
    {x:-3.5, y:.5, z:-6.3, ry:0},
    {x:0,    y:.5, z:-6.3, ry:0},
    {x:3.5,  y:.5, z:-6.3, ry:0},
    {x:-6.3, y:.5, z:-2.5, ry:Math.PI/2},
    {x:-6.3, y:.5, z:2.5,  ry:Math.PI/2},
    {x:6.3,  y:.5, z:-2.5, ry:-Math.PI/2},
  ];

  frameConfigs.forEach((cfg, i) => {
    const grp = new THREE.Group();
    grp.position.set(cfg.x, cfg.y, cfg.z);
    grp.rotation.y = cfg.ry;

    // Frame border
    const fMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.9, 1.3),
      new THREE.MeshLambertMaterial({color: dark?0x181818:0xffffff})
    );
    grp.add(fMesh);

    // Art area
    const aMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.65, 1.05),
      new THREE.MeshLambertMaterial({color: dark?0x060606:0xd8d3cb})
    );
    aMesh.position.z = 0.003;
    grp.add(aMesh);

    // Color accent stripe
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(0.04, 1.05),
      new THREE.MeshBasicMaterial({color: col})
    );
    stripe.position.set(-0.805, 0, 0.005);
    grp.add(stripe);

    grp.userData = { project: currentProject, imgIdx: i };
    gScene.add(grp);
    gFrames.push(grp);

    // Spotlight from above
    const spot = new THREE.SpotLight(0xfff5e0, dark?1.0:0.5, 8, Math.PI/9, 0.5, 1.5);
    spot.position.set(cfg.x + (cfg.ry ? (cfg.ry>0?1.5:-1.5) : 0), 4.5, cfg.z + (cfg.ry?0:0.5));
    spot.target = fMesh;
    gScene.add(spot);
    gScene.add(spot.target);
  });
}

function rebuildGallery() {
  gScene.background = new THREE.Color(dark ? 0x050505 : 0xf5f1eb);
  gScene.fog = new THREE.Fog(dark ? 0x050505 : 0xf5f1eb, 6, 18);
  buildGalleryScene();
}

function animGallery() {
  requestAnimationFrame(animGallery);
  const t = gClock ? gClock.getElapsedTime() : 0;
  gCam.position.x = Math.sin(t*0.12)*0.12;
  gCam.position.y = Math.sin(t*0.09)*0.06;
  const x=Math.sin(gPhi)*Math.sin(gTheta);
  const y=Math.cos(gPhi);
  const z=Math.sin(gPhi)*Math.cos(gTheta);
  gCam.lookAt(gCam.position.x+x, gCam.position.y+y, z);
  gRenderer.render(gScene, gCam);
}

function bindGalleryEvents() {
  const c = document.getElementById('gal-canvas');
  const rc = new THREE.Raycaster();
  const m2 = new THREE.Vector2();

  c.addEventListener('mousedown', e => {gDragging=true; gPrevXY={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup', () => gDragging=false);
  window.addEventListener('mousemove', e => {
    if(!gDragging||view!=='gallery') return;
    gTheta -= (e.clientX-gPrevXY.x)*0.003;
    gPhi=Math.max(0.25,Math.min(Math.PI-0.25,gPhi+(e.clientY-gPrevXY.y)*0.003));
    gPrevXY={x:e.clientX,y:e.clientY};
  });

  c.addEventListener('touchstart',e=>{gDragging=true;gPrevXY={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  window.addEventListener('touchmove',e=>{
    if(!gDragging||view!=='gallery')return;
    gTheta-=(e.touches[0].clientX-gPrevXY.x)*0.004;
    gPhi=Math.max(0.25,Math.min(Math.PI-0.25,gPhi+(e.touches[0].clientY-gPrevXY.y)*0.004));
    gPrevXY={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});

  c.addEventListener('click', e => {
    m2.x=(e.clientX/innerWidth)*2-1; m2.y=-(e.clientY/innerHeight)*2+1;
    rc.setFromCamera(m2, gCam);
    const all = [];
    gFrames.forEach(g => all.push(...g.children));
    const hits = rc.intersectObjects(all, true);
    if(hits.length) {
      const obj = hits[0].object;
      const grp = gFrames.find(g => g.children.includes(obj) || g===obj);
      if(grp?.userData?.project) openDetail(grp.userData.project, grp.userData.imgIdx);
    }
  });

  c.addEventListener('touchend', e => {
    if(Math.abs(e.changedTouches[0].clientX-gPrevXY.x)<10&&Math.abs(e.changedTouches[0].clientY-gPrevXY.y)<10) {
      m2.x=(e.changedTouches[0].clientX/innerWidth)*2-1;
      m2.y=-(e.changedTouches[0].clientY/innerHeight)*2+1;
      rc.setFromCamera(m2,gCam);
      const all=[];
      gFrames.forEach(g=>all.push(...g.children));
      const hits=rc.intersectObjects(all,true);
      if(hits.length){
        const grp=gFrames.find(g=>g.children.includes(hits[0].object)||g===hits[0].object);
        if(grp?.userData?.project) openDetail(grp.userData.project,grp.userData.imgIdx);
      }
    }
    gDragging=false;
  });
}

// ═══════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════
function openDetail(proj, idx) {
  view = 'detail';
  currentProject = proj;

  document.getElementById('d-color-bar').style.background = proj.color;
  document.getElementById('d-img-ph').innerHTML =
    proj.id+'_IMAGE_'+(idx+1)+'<br><span style="opacity:.35;font-size:.55rem;display:block;margin-top:.4rem">— IMAGE PLACEHOLDER —</span>';

  document.getElementById('d-title').textContent = proj.title;
  document.getElementById('d-desc').textContent = proj.desc;
  document.getElementById('d-meta').innerHTML = [
    ['Year', proj.year], ['Location', proj.location],
    ['Role', proj.role], ['Material', proj.material],
  ].map(([l,v]) => `
    <div class="meta-row">
      <span class="meta-label">${l}</span>
      <span class="meta-val">${v}</span>
    </div>`).join('');

  document.getElementById('detail').classList.add('vis');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('vis');
  view = 'gallery';
}

function backToMain() {
  document.getElementById('detail').classList.remove('vis');
  document.getElementById('gallery').classList.remove('vis');
  document.getElementById('back-btn').classList.remove('vis');
  view = 'main';
  gTheta = 0; gPhi = Math.PI/2;
}

function goBack() {
  if(view==='detail') closeDetail();
  else if(view==='gallery') backToMain();
}

// ═══════════════════════════════════════════════════
// LIGHT / DARK TOGGLE
// ═══════════════════════════════════════════════════
function toggleMode() {
  dark = !dark;
  document.body.classList.toggle('light', !dark);
  document.getElementById('mode-btn').textContent = dark ? 'LIGHT MODE' : 'DARK MODE';
  if(mScene) {
    mScene.background = new THREE.Color(dark?0x000000:0xedeae4);
    mScene.fog = new THREE.FogExp2(dark?0x000000:0xedeae4, 0.022);
    sphereMeshes.forEach(m => {
      m.userData.mat.emissiveIntensity = dark?0.7:0.3;
      m.userData.light.intensity = dark?1.2:0.4;
    });
  }
  if(gRenderer) rebuildGallery();
}

// ═══════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════
window.addEventListener('resize', () => {
  if(mRenderer) {
    mCam.aspect=innerWidth/innerHeight; mCam.updateProjectionMatrix();
    mRenderer.setSize(innerWidth,innerHeight);
  }
  if(gRenderer) {
    gCam.aspect=innerWidth/innerHeight; gCam.updateProjectionMatrix();
    gRenderer.setSize(innerWidth,innerHeight);
  }
});
</script>
